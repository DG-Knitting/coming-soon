<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DG Knitting | Coming Soon</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="coming-soon.css">
</head>
<body>
    <!-- Circular Worm Threads Background -->
    <div class="worm-threads">
        <div class="worm worm-1">
            <div class="worm-inner"></div>
        </div>
        <div class="worm worm-2"></div>
        <div class="worm worm-3">
            <div class="worm-inner"></div>
        </div>
        <div class="worm worm-4"></div>
        <div class="worm worm-5">
            <div class="worm-inner"></div>
        </div>
        <div class="worm worm-6"></div>
        <div class="worm worm-7"></div>
        <div class="worm worm-8">
            <div class="worm-inner"></div>
        </div>
        <div class="worm worm-9"></div>
        <div class="worm worm-10"></div>
    </div>

    <!-- Elegant Silk Background -->
    <div class="silk-bg">
        <div class="silk-wave"></div>
        <div class="silk-wave"></div>
        <div class="silk-wave"></div>
    </div>

    <!-- Minimal Thread Details -->
    <div class="thread-detail"></div>
    <div class="thread-detail"></div>
    <div class="thread-detail"></div>

    <!-- Main Container with Thread Ties -->
    <div class="coming-soon-container">
        <!-- Woven Pattern Overlay -->
        <div class="woven-overlay"></div>
        
        <!-- Thread Ties Background -->
        <div class="thread-ties">
            <!-- Horizontal connecting threads -->
            <div class="horizontal-thread" style="top: 15%; left: 5%; width: 90%;"></div>
            <div class="horizontal-thread" style="top: 45%; left: 5%; width: 90%;"></div>
            <div class="horizontal-thread" style="top: 75%; left: 5%; width: 90%;"></div>
            
            <!-- Vertical connecting threads -->
            <div class="vertical-thread" style="left: 15%; top: 5%; height: 90%;"></div>
            <div class="vertical-thread" style="left: 45%; top: 5%; height: 90%;"></div>
            <div class="vertical-thread" style="left: 75%; top: 5%; height: 90%;"></div>
            
            <!-- Diagonal crossing threads -->
            <div class="diagonal-thread-1" style="top: 10%; left: 10%;"></div>
            <div class="diagonal-thread-1" style="top: 30%; left: 30%;"></div>
            <div class="diagonal-thread-1" style="top: 50%; left: 50%;"></div>
            <div class="diagonal-thread-2" style="top: 20%; right: 10%;"></div>
            <div class="diagonal-thread-2" style="top: 40%; right: 30%;"></div>
            <div class="diagonal-thread-2" style="top: 60%; right: 50%;"></div>
            
            <!-- Thread knots (ties) at intersections -->
            <div class="thread-knot" style="top: 15%; left: 15%;"></div>
            <div class="thread-knot" style="top: 15%; left: 45%;"></div>
            <div class="thread-knot" style="top: 15%; left: 75%;"></div>
            
            <div class="thread-knot" style="top: 45%; left: 15%;"></div>
            <div class="thread-knot" style="top: 45%; left: 45%;"></div>
            <div class="thread-knot" style="top: 45%; left: 75%;"></div>
            
            <div class="thread-knot" style="top: 75%; left: 15%;"></div>
            <div class="thread-knot" style="top: 75%; left: 45%;"></div>
            <div class="thread-knot" style="top: 75%; left: 75%;"></div>
            
            <!-- Additional decorative knots -->
            <div class="thread-knot" style="top: 30%; left: 30%;"></div>
            <div class="thread-knot" style="top: 30%; left: 60%;"></div>
            <div class="thread-knot" style="top: 60%; left: 30%;"></div>
            <div class="thread-knot" style="top: 60%; left: 60%;"></div>
            
            <!-- Thread intersections -->
            <div class="thread-intersection" style="top: 22%; left: 22%;"></div>
            <div class="thread-intersection" style="top: 22%; left: 52%;"></div>
            <div class="thread-intersection" style="top: 22%; left: 82%;"></div>
            <div class="thread-intersection" style="top: 52%; left: 22%;"></div>
            <div class="thread-intersection" style="top: 52%; left: 52%;"></div>
            <div class="thread-intersection" style="top: 52%; left: 82%;"></div>
            <div class="thread-intersection" style="top: 82%; left: 22%;"></div>
            <div class="thread-intersection" style="top: 82%; left: 52%;"></div>
            <div class="thread-intersection" style="top: 82%; left: 82%;"></div>
        </div>

        <!-- Logo -->
        <div class="logo-wrapper">
            <img src="logo.png" alt="DG Knitting" class="logo">
        </div>

        <!-- Elegant Divider -->
        <div class="divider">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- Main Message -->
        <h1 class="main-title">
            <span class="title-line">Something</span>
            <span class="title-line accent">Exceptional</span>
            <span class="title-line">is Coming</span>
        </h1>

        <p class="description">
            For over two decades, we've woven precision into every thread. 
            Our new digital space is being crafted with the same meticulous attention to detail.
        </p>

        <!-- Refined Countdown -->
        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>

        <!-- Minimal Line -->
        <div class="minimal-line"></div>

        <!-- Launch Date -->
        <div class="launch-date">
            <span>Launching March 30, 2026</span>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="coming-soon.js"></script>
</body>
</html>
